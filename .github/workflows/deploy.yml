name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # - name: Install wasm-bindgen-cli
      #   run: |
      #     WASM_BINDGEN_VERSION=$(grep -A2 'name = "wasm-bindgen"' Cargo.lock | grep '^version' | cut -d'"' -f2)
      #     echo "Installing wasm-bindgen-cli ${WASM_BINDGEN_VERSION}"
      #     cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked

      - name: Build WASM
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown

      - name: Generate JS bindings
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          OUT_NAME="bevy-${TIMESTAMP}"
          echo "OUT_NAME=${OUT_NAME}" >> "$GITHUB_ENV"
          wasm-bindgen \
            --out-dir ./out \
            --out-name "${OUT_NAME}" \
            --target web \
            --no-typescript \
            target/wasm32-unknown-unknown/wasm-release/bevy-hehe.wasm

      - name: Assemble site
        run: |
          cp index.html ./out/
          cp -r assets ./out/

      - name: Embed WASM file size into index.html
        run: |
          WASM_SIZE=$(wc -c < "./out/${OUT_NAME}_bg.wasm" | tr -d ' ')
          sed \
            -e "s/{{WASM_SIZE}}/${WASM_SIZE}/" \
            -e "s/bevy-hehe\.js/${OUT_NAME}.js/g" \
            -e "s/bevy-hehe_bg\.wasm/${OUT_NAME}_bg.wasm/g" \
            ./out/index.html > ./out/index.html.tmp
          mv ./out/index.html.tmp ./out/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
