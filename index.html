<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合合游戏 (HeHe Game)</title>

  <!--
    音频上下文解锁脚本 (Audio Context Unlock)
    ───────────────────────────────────────────────────────────────────────────
    浏览器的自动播放策略（Autoplay Policy）会将所有 Web Audio API AudioContext
    初始化为"suspended"（暂停）状态，直到页面收到用户手势（点击、按键或触摸）。

    Bevy 在 WASM 下通过 rodio crate 内部创建 AudioContext，外部代码无法直接访问
    该实例。本脚本在 WASM 模块加载之前拦截 AudioContext 构造函数，捕获所有被创建
    的实例（包括 Bevy/rodio 内部创建的实例），在用户首次交互时对所有实例同步调用
    resume()。这是跨浏览器最可靠的解决方案，因为 resume() 必须在同步的用户事件
    处理器内调用，而不能在 requestAnimationFrame 回调（Bevy ECS 的运行时机）中
    调用。
  -->
  <script>
    (function () {
      var OrigAudioContext = window.AudioContext || window.webkitAudioContext;
      if (!OrigAudioContext) return;

      var captured = [];
      var eventTypes = ["click", "keydown", "touchstart", "pointerdown"];

      // Patch the constructor so every AudioContext created after this point
      // (including the one Bevy/rodio creates internally) is captured.
      function PatchedAudioContext(options) {
        var ctx = new OrigAudioContext(options);
        captured.push(ctx);
        return ctx;
      }
      PatchedAudioContext.prototype = OrigAudioContext.prototype;

      window.AudioContext = PatchedAudioContext;
      if (window.webkitAudioContext) {
        window.webkitAudioContext = PatchedAudioContext;
      }

      // Resume all captured contexts synchronously inside the user-gesture
      // handler.  This is the only reliable way to satisfy the browser's
      // autoplay policy across Chrome, Firefox, and Safari.
      function resumeAll() {
        // Drop closed contexts to avoid holding stale references.
        captured = captured.filter(function (ctx) {
          return ctx.state !== "closed";
        });

        captured.forEach(function (ctx) {
          if (ctx.state === "suspended") {
            ctx.resume();
          }
        });

        // Once every captured context is running, remove the listeners.
        if (captured.length > 0 &&
            captured.every(function (ctx) { return ctx.state === "running"; })) {
          eventTypes.forEach(function (type) {
            document.removeEventListener(type, resumeAll, true);
          });
        }
      }

      eventTypes.forEach(function (type) {
        document.addEventListener(type, resumeAll, { capture: true, passive: true });
      });
    })();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #1c1712;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1c1712;
      color: #f5e8c7;
      font-family: sans-serif;
      font-size: 1.2rem;
      gap: 1rem;
      z-index: 10;
    }

    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #554433;
      border-top-color: #e0b84a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading .progress-bar-wrap {
      width: 260px;
      height: 10px;
      background: #3a2e1e;
      border-radius: 5px;
      overflow: hidden;
    }

    #loading .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #e0b84a;
      border-radius: 5px;
      transition: width 0.2s ease;
    }

    #loading .progress-text {
      font-size: 0.9rem;
      color: #b89b6a;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-status">合合游戏加载中…</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <span class="progress-text" id="progress-text">0%</span>
  </div>

  <canvas id="bevy-canvas"></canvas>

  <script type="module">
    import init from "./hehe.js";

    const fill = document.getElementById("progress-fill");
    const text = document.getElementById("progress-text");
    const statusLabel = document.getElementById("loading-status");

    // Cap ratio at 1 so the bar never visually exceeds 100%.
    function setProgress(ratio) {
      const pct = Math.round(Math.min(ratio, 1) * 100);
      fill.style.width = pct + "%";
      text.textContent = pct + "%";
    }

    async function fetchWasmWithProgress(url) {
      // Build script replaces {{WASM_SIZE}} with the actual decompressed file
      // size so we can track real progress even when the server compresses the
      // response (gzip / brotli).  Falls back to 0 during local development.
      const knownSize = parseInt("{{WASM_SIZE}}", 10) || 0;

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`加载失败: ${response.status} ${response.statusText}`);
      }

      const contentLength = response.headers.get("content-length");
      const contentEncoding = response.headers.get("content-encoding");
      const isCompressed =
        contentEncoding != null &&
        contentEncoding.toLowerCase() !== "identity";

      // Prefer the build-time known size (works even with compression).
      // Fall back to Content-Length when serving uncompressed.
      const total =
        knownSize > 0
          ? knownSize
          : !isCompressed && contentLength
            ? parseInt(contentLength, 10)
            : 0;
      let loaded = 0;

      if (!response.body) {
        const buffer = await response.arrayBuffer();
        return buffer;
      }

      const reader = response.body.getReader();
      const chunks = [];
      let chunkCount = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        chunkCount++;
        if (total > 0) {
          setProgress(loaded / total);
        } else {
          setProgress(0.9 * (1 - Math.exp(-chunkCount / 20)));
        }
      }

      const buffer = new Uint8Array(loaded);
      let offset = 0;
      for (const chunk of chunks) {
        buffer.set(chunk, offset);
        offset += chunk.length;
      }
      return buffer.buffer;
    }

    fetchWasmWithProgress("./hehe_bg.wasm")
      .then((wasmBuffer) => {
        // WASM download finished — show 100 % and switch status text before
        // the (potentially slow) compilation + instantiation step.
        setProgress(1);
        if (statusLabel) statusLabel.textContent = "正在初始化…";
        return init(wasmBuffer);
      })
      .then(() => {
        const loading = document.getElementById("loading");
        if (loading) loading.remove();
      })
      .catch((err) => {
        const loading = document.getElementById("loading");
        if (loading) {
          loading.textContent = "";
          const msg = document.createElement("span");
          msg.style.color = "#e05050";
          msg.textContent = "加载出错，请刷新重试";
          const detail = document.createElement("span");
          detail.style.cssText = "font-size:0.8rem;color:#b89b6a";
          detail.textContent = err.message;
          loading.appendChild(msg);
          loading.appendChild(detail);
        }
      });
  </script>
</body>

</html>
