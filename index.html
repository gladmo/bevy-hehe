<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合合游戏 (HeHe Game)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #1c1712;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #1c1712;
        color: #f5e8c7;
        font-family: sans-serif;
        font-size: 1.2rem;
        gap: 1rem;
        z-index: 10;
      }

      #loading .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #554433;
        border-top-color: #e0b84a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #loading .progress-bar-wrap {
        width: 260px;
        height: 10px;
        background: #3a2e1e;
        border-radius: 5px;
        overflow: hidden;
      }

      #loading .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #e0b84a;
        border-radius: 5px;
        transition: width 0.2s ease;
      }

      #loading .progress-text {
        font-size: 0.9rem;
        color: #b89b6a;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span>合合游戏加载中…</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0%</span>
    </div>

    <canvas id="bevy-canvas"></canvas>

    <script type="module">
      import init from "./bevy-hehe.js";

      const fill = document.getElementById("progress-fill");
      const text = document.getElementById("progress-text");

      function setProgress(ratio) {
        const pct = Math.round(ratio * 100);
        fill.style.width = pct + "%";
        text.textContent = pct + "%";
      }

      async function fetchWasmWithProgress(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`加载失败: ${response.status} ${response.statusText}`);
        }

        const contentLength = response.headers.get("content-length");
        const total = contentLength ? parseInt(contentLength, 10) : 0;
        let loaded = 0;

        if (!response.body) {
          const buffer = await response.arrayBuffer();
          return buffer;
        }

        const reader = response.body.getReader();
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          if (total > 0) setProgress(loaded / total);
        }

        const buffer = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
          buffer.set(chunk, offset);
          offset += chunk.length;
        }
        return buffer.buffer;
      }

      fetchWasmWithProgress("./bevy-hehe_bg.wasm")
        .then((wasmBuffer) => {
          setProgress(1);
          return init(wasmBuffer);
        })
        .then(() => {
          const loading = document.getElementById("loading");
          if (loading) loading.remove();
        })
        .catch((err) => {
          const loading = document.getElementById("loading");
          if (loading) {
            loading.textContent = "";
            const msg = document.createElement("span");
            msg.style.color = "#e05050";
            msg.textContent = "加载出错，请刷新重试";
            const detail = document.createElement("span");
            detail.style.cssText = "font-size:0.8rem;color:#b89b6a";
            detail.textContent = err.message;
            loading.appendChild(msg);
            loading.appendChild(detail);
          }
        });
    </script>
  </body>
</html>
