<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合合游戏 (HeHe Game)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #1c1712;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #1c1712;
        color: #f5e8c7;
        font-family: sans-serif;
        font-size: 1.2rem;
        gap: 1rem;
        z-index: 10;
      }

      #loading .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #554433;
        border-top-color: #e0b84a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span>合合游戏加载中…</span>
    </div>

    <canvas id="bevy-canvas"></canvas>

    <script type="module">
      import init from "./bevy-hehe.js";

      init().then(() => {
        const loading = document.getElementById("loading");
        if (loading) loading.remove();
      });
    </script>
  </body>
</html>
